services:
  - type: web
    name: aws-quiz-app
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aws-quiz-db
          property: connectionString

databases:
  - name: aws-quiz-db
    databaseName: awsquiz
    user: awsquizuser
    plan: free
